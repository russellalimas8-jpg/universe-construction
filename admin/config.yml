backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects Gallery"
    files:
      - file: "content/projects.json"
        label: "Projects List"
        name: "projects"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}} — {{fields.category}}"
            fields:
              - { label: "Project Title", name: "title", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Renovation", value: "renovation" }
                  - { label: "Handyman / Repairs", value: "handyman" }
                  - { label: "Painting", value: "painting" }
                  - { label: "Roof Cleaning", value: "roofing" }
                  - { label: "Other", value: "other" }
              - { label: "Label (e.g. RENOVATION — 2026)", name: "meta", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Photo", name: "image", widget: "image", required: false }
