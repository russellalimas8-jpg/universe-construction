backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects Gallery"
    files:
      - file: "content/projects.json"
        label: "Projects List"
        name: "projects"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}} — {{fields.category}}"
            fields:
              - { label: "Project Title", name: "title", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Residential", value: "residential" }
                  - { label: "Commercial", value: "commercial" }
                  - { label: "Civil", value: "civil" }
              - { label: "Label (e.g. RESIDENTIAL — 2025)", name: "meta", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Photo", name: "image", widget: "image", required: false }
